name: Build apps

# Build standalone apps for macOS, Windows, and Linux. Run manually any time
# (Actions tab → Run workflow), or push a tag like v0.1.0 to also publish a
# GitHub Release with the three downloadable builds attached.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build the .icns icon
        run: |
          set -euxo pipefail
          ICON=packaging/yap-icon-macos.png
          WORK=$(mktemp -d); ISET="$WORK/yap.iconset"; mkdir -p "$ISET"
          for s in 16 32 128 256 512; do
            sips -z $s $s "$ICON" --out "$ISET/icon_${s}x${s}.png"
            sips -z $((s*2)) $((s*2)) "$ICON" --out "$ISET/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns "$ISET" -o "$WORK/yap.icns"
          echo "YAP_ICNS=$WORK/yap.icns" >> "$GITHUB_ENV"
      - name: Install + freeze the app
        run: |
          set -euxo pipefail
          python -m pip install -U pip wheel
          pip install ".[full]" pyinstaller pillow pyobjc-framework-ApplicationServices
          pyinstaller packaging/yap.spec --noconfirm
          test -d dist/Yap.app
      - name: Sign — Developer ID if secrets present, else ad-hoc
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -n "${CERT_P12:-}" ]; then
            echo "==> Developer ID signing (hardened runtime + entitlements)"
            KCHAIN=build.keychain; KPW="ci-$RANDOM-$RANDOM"
            security create-keychain -p "$KPW" "$KCHAIN"
            security set-keychain-settings -lut 21600 "$KCHAIN"
            security unlock-keychain -p "$KPW" "$KCHAIN"
            echo "$CERT_P12" | base64 --decode > cert.p12
            security import cert.p12 -k "$KCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
            security list-keychains -d user -s "$KCHAIN" login.keychain
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KCHAIN" >/dev/null
            codesign --force --deep --options runtime --timestamp \
              --entitlements packaging/entitlements.plist --sign "$SIGN_IDENTITY" dist/Yap.app
            codesign --verify --deep --strict --verbose=2 dist/Yap.app
          else
            echo "::warning::No MACOS_CERT_P12 secret — falling back to ad-hoc. Downloads WILL hit Gatekeeper and permissions will not persist across updates. Add the Developer ID secrets to fix."
            codesign --force --deep --sign - dist/Yap.app || true
          fi
      - name: Notarize + staple — only if notary secrets present
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${NOTARY_APPLE_ID:-}" ]; then
            echo "==> submitting to Apple notary service"
            ditto -c -k --keepParent dist/Yap.app notarize.zip
            xcrun notarytool submit notarize.zip \
              --apple-id "$NOTARY_APPLE_ID" --password "$NOTARY_PASSWORD" --team-id "$NOTARY_TEAM_ID" --wait
            xcrun stapler staple dist/Yap.app
            xcrun stapler validate dist/Yap.app
          else
            echo "::warning::No NOTARY_APPLE_ID secret — app is not notarized; Gatekeeper will block the download."
          fi
      - name: Zip the (stapled) app
        run: ditto -c -k --keepParent dist/Yap.app Yap-macOS.zip
      - uses: actions/upload-artifact@v4
        with: { name: Yap-macOS, path: Yap-macOS.zip }

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build yap.exe
        run: powershell -ExecutionPolicy Bypass -File .\packaging\build_windows.ps1
      - name: Zip
        run: Compress-Archive -Path dist\yap\* -DestinationPath yap-Windows.zip
      - uses: actions/upload-artifact@v4
        with: { name: yap-Windows, path: yap-Windows.zip }

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install PortAudio (retry on flaky apt mirrors)
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y libportaudio2 && break
            echo "apt attempt $i failed; retrying in 10s…"; sleep 10
          done
      - name: Build
        run: |
          chmod +x packaging/build_linux.sh
          ./packaging/build_linux.sh
      - run: tar czf yap-Linux.tar.gz -C dist yap
      - uses: actions/upload-artifact@v4
        with: { name: yap-Linux, path: yap-Linux.tar.gz }

  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Yap-macOS/Yap-macOS.zip
            yap-Windows/yap-Windows.zip
            yap-Linux/yap-Linux.tar.gz
